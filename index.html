    @keyframes sparkle-up {
      0%   { transform: translateY(0) scale(0) rotate(0deg);   opacity: 0; }
      35%  { transform: translateY(-12px) scale(1.5) rotate(90deg);  opacity: 1; }
      100% { transform: translateY(-32px) scale(0.4) rotate(240deg); opacity: 0; }

    @keyframes confetti-fall {
      0%   { transform: translateY(-2px) rotate(0deg);   opacity: 0; }
      12%  { opacity: 1; }
      100% { transform: translateY(38px) rotate(440deg); opacity: 0; }
    }
    @keyframes badge-pop {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.1); }
    }
    .badge-achieved { animation: badge-pop 1.8s ease-in-out infinite; display: inline-block; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    const COLORS = ["#2563eb","#dc2626","#059669","#7c3aed","#db2777","#0891b2","#ea580c","#65a30d"];
    const SK_MEM = "profit-ranking-members-csv";
    const SK_INT = "profit-ranking-interval";
    const SK_CONFIG = "profit-ranking-config-url";
    const SK_KPI = "profit-ranking-kpi";
    const SK_WEEKS = "profit-ranking-weeks";
    const DEFAULT_CONFIG_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSVvalqnmem5wibPEgeAyQIDlV6lpdMpPjrK2qP9_9R2VNWlGg5CVROmDD05mmZuqMxrErn2SeCOinf/pub?gid=0&single=true&output=csv";

    const DEFAULT_MEMBERS = [
      { name:"加藤", sheets:{} },
      { name:"今井", sheets:{} },
      { name:"佐藤", sheets:{} },
      { name:"アミナ", sheets:{} },
      { name:"本城", sheets:{} },
    ];

    /* ═══ Helpers ═══ */
    function fY(v){if(v===0)return"¥0";const a=Math.abs(v);const s=a>=10000?`¥${(a/10000).toFixed(1)}万`:`¥${a.toLocaleString()}`;return v<0?`-${s}`:s;}
    function fF(v){if(v===0)return"¥0";return`${v<0?"-":""}¥${Math.abs(Math.round(v)).toLocaleString()}`;}
    function dS(a,b){const[am,ad]=a.split("/").map(Number);const[bm,bd]=b.split("/").map(Number);return am!==bm?am-bm:ad-bd;}
    function tS(d){return d?`${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`:"--:--";}
    function dateInRange(date,start,end){if(!start||!end)return false;const[dm,dd]=date.split("/").map(Number);const[sm,sd]=start.split("/").map(Number);const[em,ed]=end.split("/").map(Number);const d=dm*100+dd,s=sm*100+sd,e=em*100+ed;return d>=s&&d<=e;}
    async function sG(k){try{const r=localStorage.getItem(k);return r||null;}catch{return null;}}
    async function sS(k,v){try{localStorage.setItem(k,typeof v==="string"?v:JSON.stringify(v));}catch{}}

    const KV_KEYS=["profit-ranking-kpi","profit-ranking-weeks"];
    async function kvGet(k){
      try{
        const r=await fetch(`/api/kv?key=${k}`);
        if(!r.ok)throw new Error(`HTTP ${r.status}`);
        return await r.json();
      }catch(e){
        console.warn('[KV] GET failed, using localStorage:', e);
        const local=localStorage.getItem(k);
        return local?JSON.parse(local):null;
      }
    }
    async function kvSet(k,v){
      try{
        const r=await fetch(`/api/kv?key=${k}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});
        if(!r.ok)throw new Error(`HTTP ${r.status}`);
        console.log('[KV] SET ok:', k);
      }catch(e){
        console.error('[KV] SET failed:', k, e);
      }
      try{localStorage.setItem(k,JSON.stringify(v));}catch{}
    }
    function getCurrentMonth(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
    function formatMonth(ym){const[y,m]=ym.split('-');return`${y}年${m}月`;}

    /* ═══ ArrowBar ═══ */
    function ChevronBar({rate, type="monthly"}) {
      if(rate===null||rate===undefined) return <div style={{height:20}}/>;
      const h=20, tip=10;
      const pct=Math.max(0,Math.min(rate,100));
      const achieved=rate>=100;
      const bg=achieved
        ?"linear-gradient(90deg,#b45309,#f59e0b,#fde68a,#f59e0b,#b45309)"
        :pct>=70?"linear-gradient(90deg,#d97706,#f59e0b)"
        :"linear-gradient(90deg,#dc2626,#ef4444)";
      const achCls=achieved?"seg-achieved-gold":"";
      const sparkles=achieved?[
        {left:"6%",  delay:"0s",    color:"#fbbf24", char:"✦"},
        {left:"20%", delay:"0.55s", color:"#f472b6", char:"★"},
        {left:"37%", delay:"1.1s",  color:"#60a5fa", char:"✦"},
        {left:"54%", delay:"0.3s",  color:"#4ade80", char:"★"},
        {left:"70%", delay:"0.85s", color:"#a78bfa", char:"✦"},
        {left:"88%", delay:"1.4s",  color:"#fb923c", char:"★"},
      ]:[];
      const confetti=achieved?[
        {left:"4%",  color:"#fbbf24", delay:"0s",    w:6, h:5, round:false},
        {left:"15%", color:"#f472b6", delay:"0.4s",  w:5, h:7, round:true},
        {left:"28%", color:"#60a5fa", delay:"0.75s", w:7, h:4, round:false},
        {left:"44%", color:"#34d399", delay:"0.2s",  w:5, h:6, round:true},
        {left:"60%", color:"#a78bfa", delay:"1.0s",  w:6, h:5, round:false},
        {left:"74%", color:"#fb923c", delay:"0.6s",  w:5, h:7, round:true},
        {left:"88%", color:"#e879f9", delay:"1.3s",  w:7, h:4, round:false},
      ]:[];
      return(
        <div style={{position:"relative",overflow:"visible"}}>
          {confetti.map((p,i)=>(
            <div key={"c"+i} style={{
              position:"absolute",left:p.left,top:1,
              width:p.w,height:p.h,background:p.color,
              borderRadius:p.round?999:2,
              animation:`confetti-fall 2s ${p.delay} ease-in infinite`,
              pointerEvents:"none",zIndex:5
            }}/>
          ))}
          <div style={{background:"linear-gradient(180deg,#d1d5db,#e5e7eb)",borderRadius:4,height:h,position:"relative",overflow:"hidden",boxShadow:"inset 0 1px 3px rgba(0,0,0,.1)"}}>
            {pct>0&&(
              <div className={achCls} style={{
                position:"absolute",left:0,top:0,height:"100%",
                width:`${pct}%`,minWidth:tip+4,
                background:bg,
                clipPath:`polygon(0 0,calc(100% - ${tip}px) 0,100% 50%,calc(100% - ${tip}px) 100%,0 100%)`,
                transition:"width .5s ease"
              }}/>
            )}
          </div>
          {sparkles.map((s,i)=>(
            <span key={"s"+i} style={{
              position:"absolute",left:s.left,top:h-2,
              fontSize:9,color:s.color,lineHeight:1,
              animation:`sparkle-up 1.9s ${s.delay} ease-out infinite`,
              pointerEvents:"none",zIndex:5
            }}>{s.char}</span>
          ))}
        </div>
      );
    }

    /* ═══ CSV Parser ═══ */
    function parseCSV(text) {
      const lines = [];
      let current = [];
      let inQuotes = false;
      let cell = '';

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          current.push(cell);
          cell = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i++;
          current.push(cell);
          if (current.length > 0) lines.push(current);
          current = [];
          cell = '';
        } else {
          cell += char;
        }
      }

      if (cell || current.length > 0) {
        current.push(cell);
        lines.push(current);
      }

      return lines;
    }

    /* ═══ 合算シートパーサー ═══ */
    function parseSheetData(csvText, memberName) {
      try {
        const data = parseCSV(csvText);

        if (data.length < 3) {
          return { name: memberName, error: "データが不足しています", projects: [] };
        }

        // 日付ヘッダー行を見つける（最初の12行を探索）
        let dateRowIdx = -1;
        let dateMap = {};

        for (let i = 0; i < Math.min(data.length, 12); i++) {
          const hits = {};
          data[i].forEach((cell, ci) => {
            const s = String(cell || "").trim();
            if (/^\d{1,2}\/\d{1,2}$/.test(s)) {
              hits[ci] = s;
            }
          });
          if (Object.keys(hits).length >= 5) {
            dateRowIdx = i;
            dateMap = hits;
            break;
          }
        }

        if (dateRowIdx < 0) {
          const preview = data.slice(0, 5).map(row => row.slice(0, 10).join(', ')).join('\n');
          return {
            name: memberName,
            error: `日付ヘッダーが見つかりません。CSV公開で「合算シート」「CSV形式」を選択したか確認してください。`,
            projects: []
          };
        }

        // 合計列を見つける
        let totalCol = -1;
        data[dateRowIdx].forEach((cell, ci) => {
          if (String(cell || "").trim() === "合計") totalCol = ci;
        });

        // 粗利行を探してプロジェクトを抽出
        const projects = [];

        for (let i = dateRowIdx + 1; i < data.length; i++) {
          const row = data[i];
          let isProfitRow = false;
          let profitColIdx = -1;

          row.forEach((cell, ci) => {
            if (String(cell || "").trim() === "粗利") {
              isProfitRow = true;
              profitColIdx = ci;
            }
          });

          if (!isProfitRow) continue;

          // プロジェクト名
          let projName = "";
          for (let ci = profitColIdx - 1; ci >= 0; ci--) {
            const val = String(row[ci] || "").trim();
            if (val && val !== "") { projName = val; break; }
          }

          // シート名
          let sheetName = String(row[1] || "").trim();
          if (!sheetName) {
            for (let j = i - 1; j >= Math.max(0, i - 3); j--) {
              const val = String(data[j][1] || "").trim();
              if (val) { sheetName = val; break; }
            }
          }

          if (sheetName === "シート名") continue;

          // プラットフォーム判定
          let platform = "Other";
          const sn = (sheetName + projName).toLowerCase();
          if (sn.includes("tik") || sn.includes("pangle")) platform = "TikTok";
          else if (sn.includes("meta") || sn.includes("mete")) platform = "Meta";
          else if (sn.includes("google")) platform = "Google";
          else if (sn.includes("line") || sn.includes("lap")) platform = "LINE";

          // 日別データ
          const daily = {};
          Object.entries(dateMap).forEach(([ci, date]) => {
            const val = row[parseInt(ci)] || "";
            const numVal = typeof val === "number" ? val : parseFloat(String(val).replace(/[¥￥,]/g, "")) || 0;
            daily[date] = numVal;
          });

          // 合計
          let total = 0;
          if (totalCol >= 0) {
            const val = row[totalCol] || "";
            total = typeof val === "number" ? val : parseFloat(String(val).replace(/[¥￥,]/g, "")) || 0;
          } else {
            total = Object.values(daily).reduce((s, v) => s + v, 0);
          }

          if (total === 0 && Object.values(daily).every(v => v === 0)) continue;

          const displayName = projName || sheetName || `案件${projects.length + 1}`;
          projects.push({
            name: displayName,
            platform: platform,
            totalProfit: total,
            daily: daily,
            sheetName: sheetName
          });
        }

        return { name: memberName, projects: projects };

      } catch (error) {
        return { name: memberName, error: error.message, projects: [] };
      }
    }

    /* ═══ Config Spreadsheet Loader ═══ */
    async function loadConfigSpreadsheet(configUrl) {
      try {
        const response = await fetch(configUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const csvText = await response.text();
        const rows = parseCSV(csvText);

        if (rows.length < 2) throw new Error("設定スプレッドシートが空です");

        const header = rows[0];
        const memberCol = 0; // メンバー名は1列目
        const monthCols = {}; // 月の列インデックス

        // ヘッダーから月の列を取得（2026-03形式）
        for (let i = 1; i < header.length; i++) {
          const monthKey = header[i].trim();
          if (/^\d{4}-\d{2}$/.test(monthKey)) {
            monthCols[monthKey] = i;
          }
        }

        if (Object.keys(monthCols).length === 0) {
          throw new Error("月のヘッダーが見つかりません（例: 2026-03）");
        }

        const members = [];
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          const memberName = row[memberCol]?.trim();
          if (!memberName) continue;

          const sheets = {};
          for (const [monthKey, colIdx] of Object.entries(monthCols)) {
            const url = row[colIdx]?.trim();
            if (url && url.startsWith('http')) {
              sheets[monthKey] = url;
            }
          }

          members.push({ name: memberName, sheets });
        }

        return members;
      } catch (error) {
        throw new Error(`設定読込エラー: ${error.message}`);
      }
    }

    /* ═══════════════════════════════════════════════════════════
       MAIN
       ═══════════════════════════════════════════════════════════ */
    function Dashboard(){
      const [reg, setReg] = useState(DEFAULT_MEMBERS);
      const [selMonth, setSelMonth] = useState(getCurrentMonth());
      const [members, setMembers] = useState([]);
      const [loading, setLoading] = useState(false);
      const [errors, setErrors] = useState({});
      const [selDate, setSelDate] = useState("");
      const [view, setView] = useState("ranking");
      const [showAdd, setShowAdd] = useState(false);
      const [showAddMonth, setShowAddMonth] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [showSetup, setShowSetup] = useState(false);
      const [addName, setAddName] = useState("");
      const [lastUp, setLastUp] = useState(null);
      const [expandedMembers, setExpandedMembers] = useState({});
      const [autoRef, setAutoRef] = useState(true);
      const [intMin, setIntMin] = useState(15);
      const [initDone, setInitDone] = useState(false);
      const [monthUrls, setMonthUrls] = useState({});
      const [newMonthYM, setNewMonthYM] = useState(getCurrentMonth());
      const [configUrl, setConfigUrl] = useState("");
      const [showConfigSetup, setShowConfigSetup] = useState(false);
      const [kpiTargets, setKpiTargets] = useState({});
      const [mode, setMode] = useState("ranking");
      const [autoSlide, setAutoSlide] = useState(false);
      const [kpiEditMember, setKpiEditMember] = useState(null);
      const [kpiEditVal, setKpiEditVal] = useState("");
      const [kpiEditWeekVal, setKpiEditWeekVal] = useState("");
      const [editingWT, setEditingWT] = useState(null);
      const [editingWTVal, setEditingWTVal] = useState("");
      const [kpiWeeks, setKpiWeeks] = useState([]);
      const [kpiSelWeekIdx, setKpiSelWeekIdx] = useState(0);
      const [showWeekAdd, setShowWeekAdd] = useState(false);
      const [showWeekDetail, setShowWeekDetail] = useState(false);
      const [selKpiMember, setSelKpiMember] = useState(null);
      const kpiDetailRef = useRef(null);
      const [weekAddStart, setWeekAddStart] = useState("");
      const [weekAddEnd, setWeekAddEnd] = useState("");
      const iRef = useRef(null);
      const regRef = useRef(reg);
      const intRef = useRef(intMin);
      const selMonthRef = useRef(selMonth);

      useEffect(()=>{regRef.current=reg;},[reg]);
      useEffect(()=>{intRef.current=intMin;},[intMin]);
      useEffect(()=>{
        if(kpiWeeks.length===0) return;
        const todayStr=`${new Date().getMonth()+1}/${new Date().getDate()}`;
        const idx=kpiWeeks.findIndex(w=>dateInRange(todayStr,w.start,w.end));
        if(idx>=0) setKpiSelWeekIdx(idx);
      },[kpiWeeks]);
      useEffect(()=>{selMonthRef.current=selMonth;},[selMonth]);

      /* ── Init ─── */
      useEffect(()=>{
        (async()=>{
          const configUrlStored = await sG(SK_CONFIG);
          const v = await sG(SK_INT);

          // デフォルトURLまたは保存されたURLを使用
          const urlToUse = configUrlStored || DEFAULT_CONFIG_URL;
          setConfigUrl(urlToUse);

          // デフォルトURLを使う場合はlocalStorageに保存
          if (!configUrlStored && DEFAULT_CONFIG_URL) {
            await sS(SK_CONFIG, DEFAULT_CONFIG_URL);
          }

          // 設定スプレッドシートから読み込む
          if (urlToUse) {
            try {
              const members = await loadConfigSpreadsheet(urlToUse);
              if (members && members.length > 0) {
                setReg(members);
                await sS(SK_MEM, JSON.stringify(members)); // localStorageにもバックアップ
              }
            } catch (error) {
              console.error('Config load error:', error);
              // フォールバック: localStorageから読み込む
              const m = await sG(SK_MEM);
              if (m) {
                try {
                  const p = JSON.parse(m);
                  if (Array.isArray(p) && p.length) setReg(p);
                } catch {}
              }
            }
          }

          if (v) {
            const n = parseInt(v);
            if (!isNaN(n)) setIntMin(n);
          } else {
            // デフォルト値を保存
            await sS(SK_INT, '15');
          }
          const kpi = await kvGet(SK_KPI);
          if (kpi) {
            try { setKpiTargets(typeof kpi==="string"?JSON.parse(kpi):kpi); } catch {}
          } else {
            const local=localStorage.getItem(SK_KPI);
            if(local){try{const p=JSON.parse(local);setKpiTargets(p);await kvSet(SK_KPI,p);}catch{}}
          }
          const wr = await kvGet(SK_WEEKS);
          if (wr) {
            try { const parsed=typeof wr==="string"?JSON.parse(wr):wr; if(Array.isArray(parsed))setKpiWeeks(parsed); } catch {}
          } else {
            const local=localStorage.getItem(SK_WEEKS);
            if(local){try{const p=JSON.parse(local);if(Array.isArray(p)){setKpiWeeks(p);await kvSet(SK_WEEKS,p);}}catch{}}
          }
          setInitDone(true);
        })();
      },[]);

      const availableMonths = useMemo(()=>{
        const months = new Set();
        reg.forEach(r=>Object.keys(r.sheets||{}).forEach(m=>months.add(m)));
        return [...months].sort().reverse();
      },[reg]);

      useEffect(()=>{
        if(availableMonths.length>0 && !availableMonths.includes(selMonth)){
          setSelMonth(availableMonths[0]);
        }
      },[availableMonths]);

      const hasDataForMonth = availableMonths.length > 0;

      /* ── Fetch CSV data ─── */
      const fetchAll = useCallback(async(monthOv)=>{
        const month = monthOv || selMonthRef.current;
        const list = regRef.current;

        const membersToFetch = list
          .filter(r=>r.sheets && r.sheets[month])
          .map(r=>({name:r.name, csvUrl:r.sheets[month]}));

        if(membersToFetch.length === 0){
          setMembers([]);
          setErrors({"データなし":"この月のデータが登録されていません"});
          return;
        }

        setLoading(true);
        setErrors({});

        try{
          const results = await Promise.all(
            membersToFetch.map(async (m) => {
              try {
                const response = await fetch(m.csvUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const csvText = await response.text();
                return parseSheetData(csvText, m.name);
              } catch (error) {
                return { name: m.name, error: `取得エラー: ${error.message}`, projects: [] };
              }
            })
          );

          const okResults = [], errs = {};
          results.forEach(d=>{
            if(d.error){ errs[d.name]=d.error; }
            else if(d.projects?.length>0){ okResults.push(d); }
            else { errs[d.name]="データなし"; }
          });

          setMembers(okResults);
          setErrors(errs);
        }catch(e){
          setErrors({"接続エラー":e.message});
        }

        setLoading(false);
        setLastUp(new Date());
      },[]);

      useEffect(()=>{if(initDone&&hasDataForMonth&&selMonth)fetchAll();},[initDone,hasDataForMonth,selMonth]);

      useEffect(()=>{
        if(iRef.current)clearInterval(iRef.current);
        if(autoRef&&hasDataForMonth&&selMonth){iRef.current=setInterval(()=>fetchAll(),intMin*60*1000);}
        return()=>{if(iRef.current)clearInterval(iRef.current);};
      },[autoRef,intMin,hasDataForMonth,selMonth,fetchAll]);

      const allDates=useMemo(()=>{
        const s=new Set();
        members.forEach(m=>m.projects.forEach(p=>Object.keys(p.daily).forEach(d=>s.add(d))));
        return[...s].sort(dS);
      },[members]);

      useEffect(()=>{
        if(allDates.length>0&&!selDate){
          // 当日の日付を取得（M/D形式）
          const today = new Date();
          const todayStr = `${today.getMonth()+1}/${today.getDate()}`;

          // 当日のデータがあればそれを選択
          if(allDates.includes(todayStr)){
            setSelDate(todayStr);
            return;
          }

          // 当日のデータがなければ、最新のデータがある日を選択
          for(let i=allDates.length-1;i>=0;i--){
            if(members.some(m=>m.projects.some(p=>(p.daily[allDates[i]]||0)!==0))){setSelDate(allDates[i]);return;}
          }
          setSelDate(allDates[allDates.length-1]);
        }
      },[allDates,selDate,members]);

      // 前日の日付を計算
      const yesterdayDate = useMemo(()=>{
        if(!selDate) return "";
        const [m,d] = selDate.split("/").map(Number);
        const date = new Date(new Date().getFullYear(), m-1, d);
        date.setDate(date.getDate() - 1);
        return `${date.getMonth()+1}/${date.getDate()}`;
      },[selDate]);

      const rData=useMemo(()=>members.map((m,i)=>({name:m.name,dayProfit:m.projects.reduce((s,p)=>s+(p.daily[selDate]||0),0),yesterdayProfit:m.projects.reduce((s,p)=>s+(p.daily[yesterdayDate]||0),0),monthTotal:m.projects.reduce((s,p)=>s+p.totalProfit,0),color:COLORS[i%COLORS.length]})),[members,selDate,yesterdayDate]);
      const dayR=useMemo(()=>[...rData].sort((a,b)=>b.dayProfit-a.dayProfit),[rData]);
      const yesterdayR=useMemo(()=>[...rData].sort((a,b)=>b.yesterdayProfit-a.yesterdayProfit),[rData]);
      const monR=useMemo(()=>[...rData].sort((a,b)=>b.monthTotal-a.monthTotal),[rData]);
      const tDay=rData.reduce((s,r)=>s+r.dayProfit,0);
      const tYesterday=rData.reduce((s,r)=>s+r.yesterdayProfit,0);
      const tMon=rData.reduce((s,r)=>s+r.monthTotal,0);

      const platformData=useMemo(()=>{
        const pMap={};
        members.forEach(m=>{
          m.projects.forEach(p=>{
            const platform=p.platform||'Other';
            if(!pMap[platform]){pMap[platform]={platform,yesterdayProfit:0,monthTotal:0};}
            pMap[platform].yesterdayProfit+=(p.daily[yesterdayDate]||0);
            pMap[platform].monthTotal+=p.totalProfit;
          });
        });
        return Object.values(pMap).map((p,i)=>({...p,color:COLORS[i%COLORS.length]}));
      },[members,yesterdayDate]);
      const platformDayR=useMemo(()=>[...platformData].sort((a,b)=>b.yesterdayProfit-a.yesterdayProfit),[platformData]);
      const platformMonR=useMemo(()=>[...platformData].sort((a,b)=>b.monthTotal-a.monthTotal),[platformData]);

      const saveReg=async l=>{setReg(l);regRef.current=l;await sS(SK_MEM,JSON.stringify(l));};
      const saveInt=async v=>{setIntMin(v);await sS(SK_INT,String(v));};

      const handleAddMember=async()=>{
        if(!addName.trim()){alert("担当者名を入力してください");return;}
        if(reg.some(r=>r.name===addName.trim())){alert("既に登録済みです");return;}
        const nl=[...reg,{name:addName.trim(),sheets:{}}];
        await saveReg(nl);
        setShowAdd(false);
        setAddName("");
      };

      const handleAddMonthData=async()=>{
        if(!newMonthYM){alert("月を選択してください");return;}

        const hasData = Object.values(monthUrls).some(url=>url.trim());
        if(!hasData){alert("少なくとも1人のCSV URLを入力してください");return;}

        const nl = reg.map(r=>{
          const url = monthUrls[r.name];
          if(!url || !url.trim()) return r;

          return {
            ...r,
            sheets: {
              ...r.sheets,
              [newMonthYM]: url.trim()
            }
          };
        });

        await saveReg(nl);
        setSelMonth(newMonthYM);
        setShowAddMonth(false);
        setMonthUrls({});
        fetchAll(newMonthYM);
      };

      const removeMember=async name=>{
        if(!confirm(`${name} を削除しますか？`))return;
        const nl=reg.filter(r=>r.name!==name);
        await saveReg(nl);
        setMembers(prev=>prev.filter(m=>m.name!==name));
      };

      const toggleMemberExpand=(rankingType,memberName)=>{
        const key=`${rankingType}-${memberName}`;
        setExpandedMembers(prev=>({...prev,[key]:!prev[key]}));
      };

      const saveKpi = async(targets)=>{ setKpiTargets(targets); await kvSet(SK_KPI,targets); };
      const saveWeekTarget = async(memberName,weekKey,val)=>{
        const cur=kpiTargets[memberName]||{};
        await saveKpi({...kpiTargets,[memberName]:{...cur,weeks:{...(cur.weeks||{}),[weekKey]:val}}});
      };
      const saveWeeks = async(weeks)=>{ setKpiWeeks(weeks); await kvSet(SK_WEEKS,weeks); };

      useEffect(()=>{
        if(selKpiMember&&kpiDetailRef.current){
          setTimeout(()=>kpiDetailRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),50);
        }
      },[selKpiMember]);

      useEffect(()=>{
        if(!autoSlide) return;
        const id=setInterval(()=>{
          setMode(m=>m==="ranking"?"kpi":"ranking");
          window.scrollTo({top:0,behavior:"smooth"});
        },30000);
        return ()=>clearInterval(id);
      },[autoSlide]);

      function generateWeeksForMonth(yearMonth){
        const[year,month]=yearMonth.split("-").map(Number);
        const first=new Date(year,month-1,1);
        const last=new Date(year,month,0);
        const weeks=[];let cur=new Date(first);
        while(cur<=last){
          const start=`${cur.getMonth()+1}/${cur.getDate()}`;
          let end=new Date(cur);
          while(end.getDay()!==0&&end<last)end.setDate(end.getDate()+1);
          if(end>last)end=new Date(last);
          weeks.push({start,end:`${end.getMonth()+1}/${end.getDate()}`});
          cur=new Date(end);cur.setDate(cur.getDate()+1);
        }
        return weeks;
      }

      function addNextWeek(weeks,yearMonth){
        const[year,month]=yearMonth.split("-").map(Number);
        const last=new Date(year,month,0);
        if(weeks.length===0)return generateWeeksForMonth(yearMonth).slice(0,1);
        const prev=weeks[weeks.length-1];
        const[em,ed]=prev.end.split("/").map(Number);
        const yr=new Date().getFullYear();
        const nextMon=new Date(yr,em-1,ed+1);
        if(nextMon>last)return weeks;
        let nextSun=new Date(nextMon);
        while(nextSun.getDay()!==0&&nextSun<last)nextSun.setDate(nextSun.getDate()+1);
        if(nextSun>last)nextSun=new Date(last);
        return[...weeks,{start:`${nextMon.getMonth()+1}/${nextMon.getDate()}`,end:`${nextSun.getMonth()+1}/${nextSun.getDate()}`}];
      }

      const weekDates = useMemo(()=>{
        const today=new Date();
        const dow=today.getDay();
        const mon=new Date(today);
        mon.setDate(today.getDate()-(dow===0?6:dow-1));
        const dates=[];
        for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(`${d.getMonth()+1}/${d.getDate()}`);}
        return dates;
      },[]);

      const kpiData = useMemo(()=>{
        const todayStr=`${new Date().getMonth()+1}/${new Date().getDate()}`;
        return rData.map(r=>{
          const target=(kpiTargets[r.name]?.monthly)||0;
          const mem=members.find(m=>m.name===r.name);
          const rate=target>0?Math.min((r.monthTotal/target)*100,999):null;
          const weekData=kpiWeeks.map(w=>{
            const key=`${w.start}~${w.end}`;
            const wTarget=(kpiTargets[r.name]?.weeks?.[key])||0;
            const profit=mem?allDates.filter(d=>dateInRange(d,w.start,w.end)).reduce((s,d)=>s+mem.projects.reduce((ps,p)=>ps+(p.daily[d]||0),0),0):0;
            const wRate=wTarget>0?Math.min(profit/wTarget*100,999):null;
            const[em,ed]=w.end.split("/").map(Number);
            const[tm,td]=todayStr.split("/").map(Number);
            const isPast=em*100+ed<tm*100+td;
            const isCurrent=dateInRange(todayStr,w.start,w.end);
            return{key,...w,profit,target:wTarget,rate:wRate,isPast,isCurrent};
          });
          const selWD=weekData[kpiSelWeekIdx]||null;
          return{...r,target,rate,weekData,selWD};
        });
      },[rData,kpiTargets,kpiWeeks,kpiSelWeekIdx,members,allDates]);

      /* ═══ RENDER ═══ */
      return(
        <div style={{minHeight:"100vh",background:"#f8f9fa"}}>
          <style>{`@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}`}</style>

            <div style={{maxWidth:1280,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",gap:20,flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:16}}>

                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 17L9 11L13 15L21 7" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                    <path d="M21 7V13M21 7H15" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>

                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{display:"flex",background:"#f3f4f6",borderRadius:10,padding:4,gap:2}}>
                    <button onClick={()=>setMode("ranking")} style={{padding:"8px 20px",fontSize:14,fontWeight:600,border:"none",borderRadius:8,cursor:"pointer",background:mode==="ranking"?"white":"transparent",color:mode==="ranking"?"#111827":"#6b7280",boxShadow:mode==="ranking"?"0 1px 4px rgba(0,0,0,.1)":"none",transition:"all .15s"}}>ランキング</button>
                    <button onClick={()=>setMode("kpi")} style={{padding:"8px 20px",fontSize:14,fontWeight:600,border:"none",borderRadius:8,cursor:"pointer",background:mode==="kpi"?"white":"transparent",color:mode==="kpi"?"#7c3aed":"#6b7280",boxShadow:mode==="kpi"?"0 1px 4px rgba(0,0,0,.1)":"none",transition:"all .15s"}}>KPI管理</button>
                  </div>
                  <button onClick={()=>setAutoSlide(v=>!v)} style={{display:"flex",alignItems:"center",gap:5,padding:"8px 14px",fontSize:12,fontWeight:700,border:"none",borderRadius:8,cursor:"pointer",background:autoSlide?"#7c3aed":"#e5e7eb",color:autoSlide?"white":"#6b7280",transition:"all .2s",whiteSpace:"nowrap"}}>
                    {autoSlide?"⏸ 自動切替中":"▶ 自動切替"}
                  </button>
                </div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                {availableMonths.length>0&&<select value={selMonth} onChange={e=>setSelMonth(e.target.value)} style={sel}>{availableMonths.map(m=><option key={m} value={m}>{formatMonth(m)}</option>)}</select>}
                {allDates.length>0&&<select value={selDate} onChange={e=>setSelDate(e.target.value)} style={sel}>{allDates.map(d=><option key={d} value={d}>{d}</option>)}</select>}
                {hasDataForMonth&&<button onClick={()=>{setSelDate("");fetchAll();}} style={btn2}>更新</button>}
                <button onClick={()=>setShowSettings(true)} style={btn2}>設定</button>
                <button onClick={()=>setShowAddMonth(true)} style={btn1}>+ 月次データ追加</button>
              </div>
            </div>
          </header>

          <main style={{padding:"24px",maxWidth:1280,margin:"0 auto"}}>

            {/* SETUP */}
            {showSetup&&(
              <Modal onClose={()=>setShowSetup(false)}>
                <h3 style={{fontSize:20,fontWeight:600,margin:"0 0 16px"}}>セットアップ手順</h3>
                <div style={{fontSize:14,lineHeight:1.8,color:"#4b5563"}}>
                  <p style={{marginBottom:12}}><strong>1. スプレッドシートを開く</strong><br/>担当者の「合算シート」があるスプレッドシートを開きます</p>
                  <p style={{marginBottom:12}}><strong>2. ウェブに公開</strong><br/>ファイル → 共有 → ウェブに公開 → シート: 合算シート、形式: CSV → 公開</p>
                  <p style={{marginBottom:12}}><strong>3. URLをコピー</strong><br/>生成されたCSV URLをコピーします</p>
                  <p><strong>4. 月次データで登録</strong><br/>「+ 月次データ追加」から各担当者のCSV URLを登録します</p>
                </div>
                <div style={{marginTop:24,textAlign:"right"}}>
                  <button onClick={()=>setShowSetup(false)} style={btn1}>OK</button>
                </div>
              </Modal>
            )}

            {/* LOADING */}
            {loading&&(
              <div style={{textAlign:"center",padding:"80px 0"}}>
                <div style={{width:48,height:48,border:"3px solid #e5e7eb",borderTopColor:"#2563eb",borderRadius:"50%",margin:"0 auto 16px",animation:"spin .8s linear infinite"}}/>
                <p style={{color:"#6b7280",fontSize:15}}>データ取得中...</p>
              </div>
            )}

            {/* ERRORS */}
            {Object.keys(errors).length>0&&!loading&&(
              <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"16px",marginBottom:24}}>
                <p style={{color:"#dc2626",fontSize:14,fontWeight:600,margin:"0 0 8px"}}>エラー</p>
                {Object.entries(errors).map(([n,e])=><p key={n} style={{color:"#991b1b",fontSize:13,margin:"4px 0"}}>{n}: {e}</p>)}
                <div style={{marginTop:12,display:"flex",gap:8}}>
                  <button onClick={()=>fetchAll()} style={btn2}>再試行</button>
                  <button onClick={()=>setShowSetup(true)} style={btn2}>セットアップ手順</button>
                </div>
              </div>
            )}

            {/* NO DATA */}
            {!loading&&!hasDataForMonth&&(
              <div style={{textAlign:"center",padding:"80px 0"}}>
                <p style={{fontSize:48,margin:"0 0 16px"}}>📊</p>
                <p style={{fontSize:18,fontWeight:500,color:"#111827",margin:"0 0 8px"}}>月次データが未登録です</p>
                <p style={{fontSize:14,color:"#6b7280",margin:"0 0 24px"}}>スプレッドシートを公開してCSV URLを登録してください</p>
                <div style={{display:"flex",gap:12,justifyContent:"center"}}>
                  <button onClick={()=>setShowSetup(true)} style={btn2}>セットアップ手順</button>
                  <button onClick={()=>setShowAddMonth(true)} style={btn1}>月次データ追加</button>
                </div>
              </div>

            {!loading&&members.length>0&&(<>
              {/* SUMMARY — ランキングモードのみ */}
              {mode==="ranking"&&<>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24,marginBottom:32,maxWidth:800}}>
                <Card>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <p style={{fontSize:14,color:"#6b7280",fontWeight:600,margin:0}}>前日利益（{yesterdayDate}）</p>
                    <div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg, #e9d5ff 0%, #d8b4fe 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>📈</div>
                  </div>
                  <p style={{fontSize:36,fontWeight:700,color:tYesterday>=0?"#059669":"#dc2626",margin:0,letterSpacing:"-0.02em"}}>{fF(tYesterday)}</p>
                </Card>
                <Card>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <p style={{fontSize:14,color:"#6b7280",fontWeight:600,margin:0}}>月間合計（{formatMonth(selMonth)}）</p>
                    <div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>💰</div>
                  </div>
                  <p style={{fontSize:36,fontWeight:700,color:tMon>=0?"#059669":"#dc2626",margin:0,letterSpacing:"-0.02em"}}>{fF(tMon)}</p>
                </Card>
              </div>

              {/* TABS */}
              <div style={{display:"flex",gap:4,marginBottom:20,borderBottom:"2px solid #e5e7eb"}}>
                {[{k:"ranking",l:"ランキング"},{k:"platform",l:"媒体別"},{k:"detail",l:"メンバー別"}].map(t=>(
                  <button key={t.k} onClick={()=>setView(t.k)} style={{background:"none",border:"none",borderBottom:view===t.k?"2px solid #2563eb":"2px solid transparent",color:view===t.k?"#2563eb":"#6b7280",padding:"12px 20px",fontSize:14,fontWeight:view===t.k?600:400,cursor:"pointer",marginBottom:-2}}>{t.l}</button>
                ))}
              </div>

              {view==="ranking"&&(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
                  <Card>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
                      <div style={{width:10,height:10,borderRadius:"50%",background:"#7c3aed"}}/>
                      <h3 style={{fontSize:18,fontWeight:700,margin:0,color:"#111827"}}>前日ランキング（{yesterdayDate}）</h3>
                    </div>
                    {yesterdayR.map((r,i)=>{
                      const memberData=members.find(m=>m.name===r.name);
                      const isExpanded=expandedMembers[`yesterday-${r.name}`];
                      return(
                        <div key={r.name} style={{marginBottom:i===0?12:8}}>
                          <div onClick={()=>toggleMemberExpand('yesterday',r.name)} style={{display:"flex",alignItems:"center",padding:i===0?"18px 16px":"16px 12px",borderRadius:10,background:i===0?"linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)":i===1?"#f3f4f6":i===2?"#f9fafb":"transparent",border:i===0?"2px solid #fbbf24":"none",gap:14,transition:"all .15s",cursor:"pointer",boxShadow:i===0?"0 4px 16px rgba(251,191,36,.25)":"none"}}>
                            <div style={{width:i===0?48:i<3?40:36,height:i===0?48:i<3?40:36,borderRadius:10,background:i===0?"linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%)":i===1?"linear-gradient(135deg, #d1d5db 0%, #9ca3af 100%)":i===2?"linear-gradient(135deg, #fed7aa 0%, #fdba74 100%)":"#f3f4f6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:i===0?22:i<3?20:18,fontWeight:700,color:i<3?"white":"#6b7280",boxShadow:i===0?"0 4px 12px rgba(251,191,36,.4)":i<3?"0 2px 8px rgba(0,0,0,.15)":"none"}}>{i===0?"👑":i===1?"🥈":i===2?"🥉":i+1}</div>
                            <span style={{width:14,height:14,borderRadius:"50%",background:r.color,boxShadow:"0 2px 6px rgba(0,0,0,.15)"}}/>
                            <span style={{flex:1,fontSize:i===0?18:16,fontWeight:i===0?700:600,color:"#111827"}}>{r.name}</span>
                            <span style={{fontSize:i===0?22:18,fontWeight:700,color:r.yesterdayProfit>=0?"#059669":"#dc2626"}}>{fF(r.yesterdayProfit)}</span>

                          </div>
                          {isExpanded&&memberData&&(
                            <div style={{background:"#f9fafb",borderRadius:8,padding:"12px 16px",marginTop:8}}>
                              {memberData.projects.filter(p=>(p.daily[yesterdayDate]||0)!==0).sort((a,b)=>(b.daily[yesterdayDate]||0)-(a.daily[yesterdayDate]||0)).map((p,pi)=>(
                                <div key={pi} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:pi<memberData.projects.length-1?"1px solid #e5e7eb":"none"}}>
                                  <div style={{flex:1}}>
                                    <span style={{fontSize:13,fontWeight:600,color:"#111827"}}>{p.name}</span>

                                  </div>
                                  <span style={{fontSize:14,fontWeight:700,color:(p.daily[yesterdayDate]||0)>=0?"#059669":"#dc2626"}}>{fF(p.daily[yesterdayDate]||0)}</span>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </Card>
                  <Card>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
                      <div style={{width:10,height:10,borderRadius:"50%",background:"#f59e0b"}}/>
                      <h3 style={{fontSize:18,fontWeight:700,margin:0,color:"#111827"}}>月間ランキング（{formatMonth(selMonth)}）</h3>
                    </div>
                    {monR.map((r,i)=>{
                      const memberData=members.find(m=>m.name===r.name);
                      const isExpanded=expandedMembers[`month-${r.name}`];
                      return(

                            <span style={{fontSize:11,color:"#6b7280",fontWeight:600}}>月間: {fY(r.monthTotal)} {r.target>0&&<span style={{color:"#9ca3af"}}>/ {fY(r.target)}</span>}</span>
                            {r.target>0?<span className={r.rate>=100?"badge-achieved":""} style={{fontSize:20,fontWeight:900,color:monthColor,background:monthColor+"18",padding:"3px 10px",borderRadius:8,letterSpacing:"-0.03em"}}>{r.rate.toFixed(0)}%</span>:<span style={{fontSize:11,color:"#d1d5db"}}>目標未設定</span>}
                          </div>
                          {r.target>0&&<>
                            <ChevronBar rate={r.rate} type="monthly"/>
                            <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}>
                              <span style={{fontSize:10,fontWeight:600,color:monthColor}}>{r.rate>=100?`超過 +${fY(r.monthTotal-r.target)}`:`残り ${fY(r.target-r.monthTotal)}`}</span>
                            </div>
                          </>}
                        </div>

                        {/* 週間リスト */}
                        {r.weekData.length>0?(
                          <div style={{display:"flex",flexDirection:"column",gap:8}}>
                            {r.weekData.map((w,wi)=>{
                              const wc=w.rate===null?"#9ca3af":w.rate>=100?"#b45309":w.rate>=70?"#f59e0b":"#dc2626";
                              const barBg=w.rate===null||w.rate<=0?"":w.rate>=100?"linear-gradient(90deg,#7c3aed,#a78bfa)":w.rate>=70?"linear-gradient(90deg,#f59e0b,#fbbf24)":"linear-gradient(90deg,#dc2626,#f87171)";
                              const isEditing=editingWT?.member===r.name&&editingWT?.weekKey===w.key;
                              const bg=w.isCurrent?"#f0fdf4":w.isPast?"#f9fafb":"white";
                              const opacity=w.isPast?0.8:1;
                              return(
                                <div key={w.key} style={{background:bg,borderRadius:10,padding:"12px 16px",opacity,border:w.isCurrent?"1.5px solid #86efac":"1px solid #e5e7eb"}}>
                                  {/* ヘッダー行 */}
                                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                                      {w.isCurrent&&<span style={{background:"#dcfce7",color:"#15803d",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:999}}>今週</span>}
                                      {w.isPast&&<span style={{background:"#f3f4f6",color:"#9ca3af",fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:999}}>終了</span>}
                                      <span style={{fontSize:13,fontWeight:w.isCurrent?700:500,color:w.isPast?"#9ca3af":"#374151"}}>{w.start} 〜 {w.end}</span>
                                    </div>
                                    {w.rate!==null&&<span className={w.rate>=100?"badge-achieved":""} style={{fontSize:20,fontWeight:900,color:wc,background:wc+"18",padding:"3px 10px",borderRadius:8,letterSpacing:"-0.03em"}}>{w.rate.toFixed(0)}%</span>}
                                  </div>

                                  {/* 実績 / 目標 */}
                                  <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:8}}>
                                    <span style={{fontSize:20,fontWeight:700,color:w.profit>0?(w.isPast?"#6b7280":"#111827"):"#d1d5db"}}>{fY(w.profit)}</span>
                                    {w.target>0&&<span style={{fontSize:13,color:"#9ca3af"}}>/ {fY(w.target)}</span>}
                                    {w.rate!==null&&w.rate>=100&&<span style={{fontSize:11,fontWeight:700,color:"#7c3aed",marginLeft:4}}>+{fY(w.profit-w.target)} 超過</span>}
                                    {w.rate!==null&&w.rate<100&&<span style={{fontSize:11,color:"#9ca3af",marginLeft:4}}>残り {fY(w.target-w.profit)}</span>}
                                  </div>

                                  {/* プログレスバー */}
                                  <div style={{marginBottom:8}}>
                                    {w.target>0?<ChevronBar rate={w.rate} type="weekly"/>:<div style={{height:20}}/>}
                                  </div>

                                  {/* 目標設定 */}
                                  {isEditing?(
                                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                                      <input autoFocus type="number" value={editingWTVal} onChange={e=>setEditingWTVal(e.target.value)}
                                        onKeyDown={async e=>{if(e.key==="Enter"){await saveWeekTarget(r.name,w.key,parseInt(editingWTVal)||0);setEditingWT(null);}if(e.key==="Escape")setEditingWT(null);}}
                                        style={{flex:1,fontSize:13,padding:"5px 10px",border:"1.5px solid #7c3aed",borderRadius:6,outline:"none"}} placeholder="週間目標（円）"/>
                                      <button onClick={async()=>{await saveWeekTarget(r.name,w.key,parseInt(editingWTVal)||0);setEditingWT(null);}} style={{padding:"5px 14px",background:"#7c3aed",color:"white",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>保存</button>
                                      <button onClick={()=>setEditingWT(null)} style={{padding:"5px 10px",background:"#f3f4f6",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,color:"#6b7280"}}>×</button>
                                    </div>
                                  ):(
                                    <button onClick={()=>{setEditingWT({member:r.name,weekKey:w.key});setEditingWTVal(w.target>0?String(w.target):"");}} style={{fontSize:11,color:w.target>0?"#7c3aed":"#9ca3af",background:"none",border:`1px dashed ${w.target>0?"#c4b5fd":"#d1d5db"}`,borderRadius:6,padding:"4px 12px",cursor:"pointer"}}>
                                      {w.target>0?`目標を変更: ${fY(w.target)}`:"+ 週間目標を設定"}
                                    </button>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        ):(
                          <div style={{textAlign:"center",padding:"12px",background:"#f9fafb",borderRadius:8,border:"1px dashed #d1d5db"}}>
                            <p style={{fontSize:12,color:"#9ca3af",margin:0}}>「今月を自動生成」で週を追加してください</p>
                          </div>
                        )}
                      </Card>
                    );})}
                  </div>
                </div>
              )}
            </>)}
          </main>

          {/* KPI EDIT */}
          {kpiEditMember&&(
            <Modal onClose={()=>setKpiEditMember(null)}>
              <h3 style={{fontSize:18,fontWeight:600,margin:"0 0 4px"}}>{kpiEditMember} — 月間KPI目標</h3>
              <p style={{fontSize:13,color:"#6b7280",margin:"0 0 20px"}}>月間の粗利目標を設定してください。週間目標は各週のカードから設定できます。</p>
              <label style={lb}>月間目標（円）</label>
              <input type="number" value={kpiEditVal} onChange={e=>setKpiEditVal(e.target.value)} placeholder="例: 3000000" style={inp} autoFocus/>
              {kpiEditVal&&<p style={{fontSize:13,color:"#2563eb",fontWeight:600,marginTop:8}}>{fF(Number(kpiEditVal))}</p>}
              <div style={{display:"flex",gap:8,marginTop:24,justifyContent:"flex-end"}}>
                {kpiTargets[kpiEditMember]?.monthly&&<button onClick={async()=>{const cur=kpiTargets[kpiEditMember]||{};await saveKpi({...kpiTargets,[kpiEditMember]:{...cur,monthly:0}});setKpiEditMember(null);}} style={{...btn2,color:"#dc2626",borderColor:"#fecaca"}}>削除</button>}
                <button onClick={()=>setKpiEditMember(null)} style={btn2}>キャンセル</button>
                <button onClick={async()=>{
                  const monthly=parseInt(kpiEditVal)||0;
                  if(!monthly){alert("目標金額を入力してください");return;}
                  const cur=kpiTargets[kpiEditMember]||{};
                  await saveKpi({...kpiTargets,[kpiEditMember]:{...cur,monthly}});
                  setKpiEditMember(null);
                }} style={btn1}>保存</button>
              </div>
            </Modal>
          )}


          {/* ADD MONTH */}
          {showAddMonth&&(
            <Modal onClose={()=>{setShowAddMonth(false);setMonthUrls({});}}>
              <h3 style={{fontSize:18,fontWeight:600,margin:"0 0 16px"}}>月次データ追加</h3>
              <p style={{fontSize:13,color:"#6b7280",margin:"0 0 16px"}}>各担当者の「合算シート」CSV公開URLを貼り付けてください</p>
              <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:6,padding:"12px",marginBottom:16}}>
                <p style={{fontSize:12,color:"#1e40af",margin:"0 0 4px",fontWeight:600}}>CSV URLの取得方法</p>
                <p style={{fontSize:11,color:"#3b82f6",margin:0}}>スプレッドシートで「ファイル → 共有 → ウェブに公開」→ シート: 合算シート、形式: CSV → 公開</p>
                <button onClick={()=>setShowSetup(true)} style={{background:"none",border:"none",color:"#2563eb",fontSize:11,padding:"4px 0",cursor:"pointer",textDecoration:"underline"}}>→ 詳細手順を見る</button>
              </div>
              <label style={lb}>対象月</label>
              <input type="month" value={newMonthYM} onChange={e=>setNewMonthYM(e.target.value)} style={{...inp,marginBottom:16}}/>
              <div style={{maxHeight:320,overflowY:"auto",display:"flex",flexDirection:"column",gap:12}}>
                {reg.map(r=>(
                  <div key={r.name}>
                    <label style={lb}>{r.name}</label>
                    <input value={monthUrls[r.name]||""} onChange={e=>setMonthUrls({...monthUrls,[r.name]:e.target.value})} placeholder="https://docs.google.com/.../pub?gid=...&output=csv" style={inp}/>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8,marginTop:20,justifyContent:"flex-end"}}>
                <button onClick={()=>{setShowAddMonth(false);setMonthUrls({});}} style={btn2}>キャンセル</button>
                <button onClick={handleAddMonthData} style={btn1}>追加して取得</button>
              </div>
            </Modal>
          )}

          {/* ADD MEMBER */}
          {showAdd&&(
            <Modal onClose={()=>{setShowAdd(false);setAddName("");}}>
              <h3 style={{fontSize:18,fontWeight:600,margin:"0 0 16px"}}>担当者を追加</h3>
              <label style={lb}>担当者名</label>
              <input value={addName} onChange={e=>setAddName(e.target.value)} placeholder="例：山田" style={inp}/>
              <div style={{display:"flex",gap:8,marginTop:20,justifyContent:"flex-end"}}>
                <button onClick={()=>{setShowAdd(false);setAddName("");}} style={btn2}>キャンセル</button>
                <button onClick={handleAddMember} style={btn1}>追加</button>
              </div>
            </Modal>
          )}

          {/* SETTINGS */}
          {showSettings&&(
            <Modal onClose={()=>setShowSettings(false)}>
              <h3 style={{fontSize:18,fontWeight:600,margin:"0 0 16px"}}>設定</h3>

              <div style={{padding:"12px 0",borderBottom:"1px solid #e5e7eb"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div>
                    <p style={{fontSize:14,fontWeight:600,margin:0}}>📊 設定スプレッドシート</p>
                    <p style={{fontSize:12,color:"#6b7280",margin:"2px 0 0"}}>全員で共有するメンバー設定</p>
                  </div>
                  <button onClick={()=>setShowConfigSetup(true)} style={{...btn1,fontSize:12,padding:"6px 12px"}}>
                    {configUrl?"変更":"設定"}
                  </button>
                </div>
                {configUrl&&(
                  <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:6,padding:"8px 12px",marginTop:8}}>
                    <p style={{fontSize:11,color:"#1e40af",margin:0,wordBreak:"break-all"}}>{configUrl}</p>
                  </div>
                )}
              </div>

              <div style={{padding:"12px 0",borderBottom:"1px solid #e5e7eb"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <p style={{fontSize:14,fontWeight:500,margin:0}}>自動更新</p>
                    <p style={{fontSize:12,color:"#6b7280",margin:"2px 0 0"}}>定期的にスプシから再取得</p>
                  </div>
                  <button onClick={()=>setAutoRef(!autoRef)} style={{width:44,height:24,borderRadius:12,border:"1px solid #e5e7eb",cursor:"pointer",position:"relative",background:autoRef?"#2563eb":"#e5e7eb"}}>
                    <div style={{width:18,height:18,borderRadius:"50%",background:"white",position:"absolute",top:2,left:autoRef?22:2,transition:"left .2s"}}/>
                  </button>
                </div>
              </div>

              {autoRef&&<div style={{padding:"12px 0",borderBottom:"1px solid #e5e7eb"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <p style={{fontSize:14,fontWeight:500,margin:0}}>更新間隔</p>
                  <select value={intMin} onChange={e=>saveInt(Number(e.target.value))} style={sel}>{[1,3,5,10,15,30].map(v=><option key={v} value={v}>{v}分</option>)}</select>
                </div>
              </div>}

              <div style={{marginTop:16}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                  <p style={{fontSize:14,fontWeight:600,margin:0}}>登録担当者（{reg.length}名）</p>
                  <button onClick={()=>{setShowSettings(false);setShowAdd(true);}} style={btn1}>+ 追加</button>
                </div>
                {reg.map(r=>(
                  <div key={r.name} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #f3f4f6"}}>
                    <div>
                      <span style={{fontSize:14,fontWeight:500}}>{r.name}</span>
                      <span style={{fontSize:12,color:"#6b7280",marginLeft:8}}>{Object.keys(r.sheets||{}).length}ヶ月分登録済み</span>
                    </div>
                    <button onClick={()=>removeMember(r.name)} style={{background:"#fef2f2",border:"1px solid #fecaca",color:"#dc2626",cursor:"pointer",fontSize:12,padding:"4px 12px",borderRadius:4}}>削除</button>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",justifyContent:"flex-end",marginTop:20,gap:8}}>
                <button onClick={()=>setShowSetup(true)} style={btn2}>セットアップ手順</button>
                <button onClick={()=>setShowSettings(false)} style={btn1}>閉じる</button>
              </div>
            </Modal>
          )}

          {/* CONFIG SETUP */}
          {showConfigSetup&&(
            <Modal onClose={()=>setShowConfigSetup(false)}>
              <h3 style={{fontSize:18,fontWeight:600,margin:"0 0 16px"}}>📊 設定スプレッドシート</h3>
              <p style={{fontSize:13,color:"#6b7280",margin:"0 0 16px"}}>
                メンバー設定を管理するスプレッドシートのCSV公開URLを入力してください。
                これを設定すると、全員が同じデータを見れるようになります。
              </p>
              <label style={lb}>設定スプレッドシート CSV URL</label>
              <input
                type="text"
                value={configUrl}
                onChange={e=>setConfigUrl(e.target.value)}
                placeholder="https://docs.google.com/spreadsheets/d/e/2PACX-..."
                style={inp}
              />
              <div style={{background:"#fef3c7",border:"1px solid #fde68a",borderRadius:6,padding:"12px",marginTop:12}}>
                <p style={{fontSize:12,color:"#92400e",margin:"0 0 4px",fontWeight:600}}>💡 設定方法</p>
                <p style={{fontSize:11,color:"#78350f",margin:0}}>
                  1. 新しいスプレッドシートを作成<br/>
                  2. 1列目にメンバー名、2列目以降に月（2026-03形式）<br/>
                  3. ファイル→共有→ウェブに公開→CSV形式で公開<br/>
                  4. 公開URLをここに貼り付け
                </p>
              </div>
              <div style={{display:"flex",justifyContent:"flex-end",marginTop:20,gap:8}}>
                <button onClick={()=>setShowConfigSetup(false)} style={btn2}>キャンセル</button>
                <button onClick={async()=>{
                  if(!configUrl.trim()){
                    alert('URLを入力してください');
                    return;
                  }
                  try{
                    await sS(SK_CONFIG,configUrl);
                    const members=await loadConfigSpreadsheet(configUrl);
                    if(members&&members.length>0){
                      setReg(members);
                      await sS(SK_MEM,JSON.stringify(members));
                      alert(`✅ 設定完了！${members.length}名のメンバーを読み込みました`);
                      setShowConfigSetup(false);
                      fetchAll();
                    }else{
                      alert('メンバーデータが見つかりませんでした');
                    }
                  }catch(error){
                    alert(`エラー: ${error.message}`);
                  }
                }} style={btn1}>保存して読み込む</button>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    /* Components */
    function Card({children}){return(<div className="card-hover" style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"24px",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>{children}</div>);}
    function Modal({children,onClose}){return(<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}><div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:16,padding:"32px",width:560,maxWidth:"92vw",maxHeight:"85vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>{children}</div></div>);}

    const sel={background:"white",border:"1.5px solid #d1d5db",borderRadius:8,color:"#111827",padding:"10px 14px",fontSize:14,cursor:"pointer",outline:"none",transition:"all .15s"};
    const btn1={background:"linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%)",border:"none",borderRadius:8,color:"white",padding:"10px 20px",fontSize:14,fontWeight:600,cursor:"pointer",boxShadow:"0 2px 8px rgba(37,99,235,.25)",transition:"all .15s"};
    const btn2={background:"white",border:"1.5px solid #d1d5db",borderRadius:8,color:"#374151",padding:"10px 20px",fontSize:14,fontWeight:500,cursor:"pointer",transition:"all .15s"};
    const lb={fontSize:13,color:"#374151",fontWeight:600,display:"block",marginBottom:6};
    const inp={width:"100%",background:"white",border:"1.5px solid #d1d5db",borderRadius:8,color:"#111827",padding:"10px 14px",fontSize:14,outline:"none",transition:"border .15s"};
    const th={textAlign:"left",padding:"12px 16px",color:"#6b7280",fontWeight:600,borderBottom:"2px solid #e5e7eb",fontSize:13,background:"#f9fafb"};
    const td={padding:"12px 16px",borderBottom:"1px solid #f3f4f6",fontSize:14};

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
